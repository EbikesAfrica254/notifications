server:
  port: ${SERVER_PORT:8086}
  servlet:
    context-path: /ebikes-notifications

spring:
  application:
    name: ebikes-notifications

  cloud:
    function:
      definition: incomingEventConsumer
    stream:
      bindings:
        incomingEventConsumer-in-0:
          destination: ebikes.domain-events
          group: ${RABBITMQ_CONSUMER_GROUP}
          consumer:
            back-off-initial-interval: ${RABBITMQ_CONSUMER_BACKOFF_INITIAL}
            back-off-max-interval: ${RABBITMQ_CONSUMER_BACKOFF_MAX}
            back-off-multiplier: ${RABBITMQ_CONSUMER_BACKOFF_MULTIPLIER}
            max-attempts: ${RABBITMQ_CONSUMER_MAX_ATTEMPTS}
        eventPublisher-out-0:
          destination: ebikes.domain-events
      rabbit:
        bindings:
          incomingEventConsumer-in-0:
            consumer:
              bindQueue: false
              declareExchange: false
              queueNameGroupOnly: true

  data:
    redis:
      host: ${SPRING_DATA_REDIS_HOST}
      password: ${SPRING_DATA_REDIS_PASSWORD}
      port: ${SPRING_DATA_REDIS_PORT}
      repositories:
        enabled: false
      ssl:
        enabled: ${SPRING_DATA_REDIS_SSL_ENABLED}

  datasource:
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: ${SPRING_DATASOURCE_HIKARI_MAXIMUM_POOL_SIZE}
      minimum-idle: ${SPRING_DATASOURCE_HIKARI_MINIMUM_IDLE}
    url: ${SPRING_DATASOURCE_URL}
    username: ${SPRING_DATASOURCE_USERNAME}

  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        default_schema: notifications
        format_sql: false
        show_sql: false
        type:
          json_format_mapper: com.ebikes.notifications.configurations.HibernateJsonFormatMapperConfiguration

  liquibase:
    change-log: classpath:database/changelog/changelog.yaml
    enabled: true
    liquibase-schema: notifications
    parameters:
      searchPath: classpath:database/changelog/

  rabbitmq:
    host: ${SPRING_RABBITMQ_HOST}
    port: ${SPRING_RABBITMQ_PORT}
    username: ${SPRING_RABBITMQ_USERNAME}

  security:
    oauth2:
      client:
        registration:
          organizations:
            provider: keycloak
            client-id: ${NOTIFICATIONS_CLIENT_ID}
            client-secret: ${NOTIFICATIONS_CLIENT_SECRET}
            authorization-grant-type: client_credentials
            client-authentication-method: client_secret_basic
        provider:
          keycloak:
            issuer-uri: ${SPRING_SECURITY_OAUTH2_CLIENT_PROVIDER_KEYCLOAK_ISSUER_URI}
      resourceserver:
        jwt:
          issuer-uri: ${SPRING_SECURITY_OAUTH2_RESOURCESERVER_JWT_ISSUER_URI}
          jwk-set-uri: ${SPRING_SECURITY_OAUTH2_RESOURCESERVER_JWT_JWK_SET_URI}

  threads:
    virtual:
      enabled: true

  task:
    scheduling:
      thread-name-prefix: notifications-scheduler-
      simple:
        concurrency-limit: 4

cache:
  iam:
    ttl-minutes: 30
    key-prefix: notifications
  organizations:
    ttl-minutes: 30
    key-prefix: notifications

clients:
  assets:
    fallback-logo-url: ${FALLBACK_URL}
  client:
    base-url: ${CLIENT_BASE_URL}
  ops:
    base-url: ${OPS_BASE_URL}

encryption:
  key: ${ENCRYPTION_KEY}

logging:
  level:
    root: INFO
    com.ebikes.notifications: DEBUG
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"

management:
  endpoint:
    health:
      show-details: never
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus

notification:
  channels:
    email:
      enabled: ${EMAIL_ENABLED:true}
      rate-limit: 500
      ses:
        endpoint: ${AWS_SES_ENDPOINT:}
        region: ${AWS_SES_REGION}
        sender-address: ${AWS_SES_SENDER_ADDRESS}
    sms:
      enabled: ${SMS_ENABLED:true}
      rate-limit: 100
      taifa-mobile:
        api-key: ${TAIFA_MOBILE_API_KEY}
        default-cost: ${TAIFA_MOBILE_DEFAULT_COST}
        sender-name: ${TAIFA_MOBILE_SENDER_NAME}
    sse:
      connection-limit: 1000
      connection-timeout: 600000
      enabled: true
      heartbeat-interval: PT30S
      rate-limit: 1000
    whatsapp:
      enabled: ${WHATSAPP_ENABLED:true}
      meta:
        api-version: ${META_API_VERSION}
        app-id: ${META_APP_ID}
        app-secret: ${META_APP_SECRET}
        phone-number-id: ${META_PHONE_NUMBER_ID}
        system-user-token: ${META_SYSTEM_USER_TOKEN}
      rate-limit: ${WHATSAPP_RATE_LIMIT}

security:
  public-endpoints:
    - /actuator/health
    - /actuator/prometheus
    - /debug/sse/send/*
  scopes:
    - email
    - openid
    - profile

services:
  iam:
    base-url: ${IAM_SERVICE_BASE_URL}
    client-registration-id: organizations
  organizations:
    base-url: ${ORGANIZATION_SERVICE_BASE_URL}
    client-registration-id: organizations
